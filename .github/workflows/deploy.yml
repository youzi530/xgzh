# bug-fix-2305 / spec/25 / Sprint 9 — Production deploy workflow
#
# 触发: push to main + ci.yml 全绿后
#
# 流程 (单 job, Sprint 9 起 5 步):
#
#   0. Sync .env: 从 GH Secrets 自动重写 /opt/xgzh/.env, 并保留 .env.local 覆盖.
#   1. Build:  docker buildx 构建 xgzh-api 镜像, tag = git sha + latest
#   2. Push:   登录阿里云 ACR, push 两个 tag
#   3. Deploy: SSH 到 ECS:
#                ├── 写 IMAGE_TAG=<sha> 到 .env
#                ├── docker compose pull
#                ├── alembic upgrade head (BUG-S9 起自动)
#                └── docker compose up -d xgzh-api  (滚动重建 BE, PG/Redis 不动)
#   4. Verify: curl http://localhost:8000/healthz (5 retry, 各 5s)
#                ├── 成功 → 输出 ✅ + 镜像 sha
#                └── 失败 → SSH rollback 上一个 sha, exit 1 让 GH Actions 标红
#
# 关键设计取舍:
# - **needs: ci.yml** 没用; GH Actions 不支持跨 workflow needs.
#   改用 ``workflow_run`` 监听 ci.yml conclusion=success, 才启动这个 workflow.
# - **手动 trigger** (workflow_dispatch) 也开放, 让用户能手动重跑 (rollback / hotfix)
# - **rollback 设计**: 每次 deploy 把上一个 IMAGE_TAG 写到 .env.previous, 失败时回退
# - **健康检查 5 retry × 5s = 25s** 足以判别 BE 启动成功 (uvicorn cold start ~3s)
# - **alembic upgrade head 自动跑** (BUG-S9-001 起): 新镜像 pull 完后, 用
#   ``docker compose run --rm xgzh-api alembic upgrade head`` 跑一次性短任务,
#   跑完即销毁; 再 ``up -d xgzh-api`` 滚动重启 BE. 迁移失败立即 exit 1 阻断部署,
#   不会让带 schema gap 的新代码起来污染生产 (历史: 不跑 alembic 时, /healthz 不查
#   users 表, 5xx 在登录接口才暴露, 自动回退抓不到, 线上炸过).
# - **.env 自动同步** (BUG-S9 自动化): 历史每次加新 env 字段都要 SSH 改 .env 容易漏,
#   现在 secrets 在 GH UI 配, 公开配置在 docker-compose.production.yml 写, 都自动同步.
#   .env.local 是逃生口 (应急覆盖, 不在 git, 优先级最高).
#   详见 docs/deploy/02-2026-05-06-secrets-automation.md.

name: Deploy

on:
  # 监听 ci.yml 跑完, 全绿才触发
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # 手动触发 (rollback / 跳过 ci 的 hotfix)
  workflow_dispatch:
    inputs:
      image_tag:
        description: "镜像 tag (默认 git sha; 写 'rollback-<sha>' 回退)"
        required: false
        default: ""

permissions:
  contents: read

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  ACR_REPOSITORY: ${{ secrets.ACR_REPOSITORY }}

jobs:
  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # workflow_run 触发时, ci.yml 全绿才进; manual dispatch 直接进
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── 1. Build & Push 镜像到阿里云 ACR ─────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "::notice::Manual deploy with tag=${{ github.event.inputs.image_tag }}"
          else
            SHA="${{ github.sha }}"
            echo "tag=${SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        if: ${{ github.event.inputs.image_tag == '' }}  # 手动 dispatch 指定 tag 时跳过 build (rollback 场景)
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: true
          # OPS-S10 部署验证: 把 short sha 注入镜像 ENV, runtime ``GET /version`` 可读;
          # 配合 ECS .env IMAGE_TAG 双向比对, 锁定 "镜像 = 代码" 的对应关系.
          build-args: |
            APP_GIT_SHA=${{ steps.tag.outputs.tag }}
          # tag 双写: <sha> (回退用) + latest (默认拉取)
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ secrets.ACR_REPOSITORY }}:${{ steps.tag.outputs.tag }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ secrets.ACR_REPOSITORY }}:latest
          # 用 GH Actions cache 加速 buildx
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── 1.2 Build H5 (Sprint 12 / ICP 备案下来后启用) ────────────────
      # 跟 BE 镜像绑定同一 git sha. H5 没 sha 注入 (静态文件, 重启不重置), 但 push 时
      # 整目录 mtime 会变, 浏览器靠 SPA 的 index.html no-cache + assets 文件名带 hash
      # 实现增量更新. 手动 dispatch 指定 image_tag (rollback) 时, 不重 build H5 (跳过).
      - name: Setup pnpm
        if: ${{ github.event.inputs.image_tag == '' }}
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js 20 (with pnpm cache)
        if: ${{ github.event.inputs.image_tag == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install pnpm deps (root + mp)
        if: ${{ github.event.inputs.image_tag == '' }}
        run: pnpm install --frozen-lockfile

      - name: Build H5 (uniapp h5 dist)
        if: ${{ github.event.inputs.image_tag == '' }}
        # 输出到 apps/mp/dist/build/h5/. cd 进 apps/mp 跑 (uniapp 要 UNI_INPUT_DIR=.)
        run: pnpm --filter ./apps/mp build:h5

      - name: Clean ECS h5-dist before scp
        if: ${{ github.event.inputs.image_tag == '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 1m
          script: |
            set -euo pipefail
            mkdir -p /opt/xgzh/h5-dist
            # 清空旧 dist 文件 (但保留目录, caddy 挂载的就是这个目录, rmdir 会让 caddy 失联)
            find /opt/xgzh/h5-dist -mindepth 1 -delete
            echo "✅ /opt/xgzh/h5-dist cleaned"

      - name: SCP H5 dist to ECS
        if: ${{ github.event.inputs.image_tag == '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "apps/mp/dist/build/h5/*"
          target: "/opt/xgzh/h5-dist"
          # 关键: strip_components=4 把 apps/mp/dist/build/h5/ 这 4 层前缀去掉,
          # 让 index.html 等文件直接落在 /opt/xgzh/h5-dist/index.html (caddy serve root)
          strip_components: 4

      # ─── 1.5 Sync .env from GitHub Secrets (Sprint 9 自动化) ──────────
      # 把 GH Secrets 里的 secrets 重写到服务器 /opt/xgzh/.env, 保留 .env.local 覆盖.
      # 加新 secret = 改本 step 的 envs: 列表 + heredoc + GH UI 加 secret. 这是 secret 来源唯一处.
      # 公开配置 (LOG_LEVEL / CORS_ORIGINS 等) 都在 docker-compose.production.yml 的 environment 块里,
      # 不要写到 .env (除非要服务器 override 默认值).
      #
      # 安全: secrets 通过 SSH envs 传输 (TLS), 不在 GH log 里输出明文. .env 在服务器 chmod 600.
      # heredoc 用 'EOF' 不带引号 → shell 变量展开 (这是想要的); 注意 secrets 不能含 ``$`` ``\`` `` ` ``,
      # 否则会被 shell 解释 (实测: random hex / base64 / URL token 都安全; webhook URL 含 ``&`` 也安全).
      - name: Sync .env from GitHub Secrets
        uses: appleboy/ssh-action@v1.0.3
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
          ACR_REPOSITORY: ${{ secrets.ACR_REPOSITORY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          WECHAT_MP_APP_ID: ${{ secrets.WECHAT_MP_APP_ID }}
          WECHAT_MP_APP_SECRET: ${{ secrets.WECHAT_MP_APP_SECRET }}
          AVATAR_PUBLIC_BASE_URL: ${{ secrets.AVATAR_PUBLIC_BASE_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          ALIYUN_SMS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_SMS_ACCESS_KEY_ID }}
          ALIYUN_SMS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_SMS_ACCESS_KEY_SECRET }}
          ALIYUN_SMS_SIGN_NAME: ${{ secrets.ALIYUN_SMS_SIGN_NAME }}
          ALIYUN_SMS_TEMPLATE_ID: ${{ secrets.ALIYUN_SMS_TEMPLATE_ID }}
          ALIYUN_SMS_INTL_TEMPLATE_ID: ${{ secrets.ALIYUN_SMS_INTL_TEMPLATE_ID }}
          SMS_ADAPTER: ${{ secrets.SMS_ADAPTER }}
          LONGBRIDGE_API_TOKEN: ${{ secrets.LONGBRIDGE_API_TOKEN }}
          OPS_ADMIN_TOKEN: ${{ secrets.OPS_ADMIN_TOKEN }}
          ALERT_DINGTALK_WEBHOOK: ${{ secrets.ALERT_DINGTALK_WEBHOOK }}
          ALERT_DINGTALK_SECRET: ${{ secrets.ALERT_DINGTALK_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          WECHATPAY_DEV_MODE: ${{ secrets.WECHATPAY_DEV_MODE }}
          WECHATPAY_MCH_ID: ${{ secrets.WECHATPAY_MCH_ID }}
          WECHATPAY_APIV3_KEY: ${{ secrets.WECHATPAY_APIV3_KEY }}
          WECHATPAY_CERT_SERIAL_NO: ${{ secrets.WECHATPAY_CERT_SERIAL_NO }}
          WECHATPAY_NOTIFY_URL: ${{ secrets.WECHATPAY_NOTIFY_URL }}
          WECHATPAY_APP_ID: ${{ secrets.WECHATPAY_APP_ID }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 2m
          envs: ACR_REGISTRY,ACR_NAMESPACE,ACR_REPOSITORY,POSTGRES_PASSWORD,JWT_SECRET,WECHAT_MP_APP_ID,WECHAT_MP_APP_SECRET,AVATAR_PUBLIC_BASE_URL,CORS_ORIGINS,ZHIPU_API_KEY,SILICONFLOW_API_KEY,DEEPSEEK_API_KEY,TUSHARE_TOKEN,ALIYUN_SMS_ACCESS_KEY_ID,ALIYUN_SMS_ACCESS_KEY_SECRET,ALIYUN_SMS_SIGN_NAME,ALIYUN_SMS_TEMPLATE_ID,ALIYUN_SMS_INTL_TEMPLATE_ID,SMS_ADAPTER,LONGBRIDGE_API_TOKEN,OPS_ADMIN_TOKEN,ALERT_DINGTALK_WEBHOOK,ALERT_DINGTALK_SECRET,SENTRY_DSN,WECHATPAY_DEV_MODE,WECHATPAY_MCH_ID,WECHATPAY_APIV3_KEY,WECHATPAY_CERT_SERIAL_NO,WECHATPAY_NOTIFY_URL,WECHATPAY_APP_ID
          script: |
            set -euo pipefail
            cd /opt/xgzh

            mkdir -p /opt/xgzh
            # 备份现有 .env (如果存在), 应急回滚用
            if [ -f .env ]; then
              cp .env .env.bak
            fi

            # 保留现有 IMAGE_TAG (Deploy step 后续会再 sed 改; 没 IMAGE_TAG 时给 latest 兜底)
            EXISTING_IMAGE_TAG=$(grep -E '^IMAGE_TAG=' .env 2>/dev/null | cut -d= -f2 || echo latest)
            if [ -z "$EXISTING_IMAGE_TAG" ]; then
              EXISTING_IMAGE_TAG=latest
            fi

            # 重写 .env (注: heredoc 不带引号, shell 变量自动展开)
            cat > .env <<EOF
            # ╔══════════════════════════════════════════════════════════════════╗
            # ║ ⚠ AUTO-GENERATED by .github/workflows/deploy.yml                 ║
            # ║ ⚠ DO NOT EDIT MANUALLY — every push to main overwrites this file.║
            # ║                                                                  ║
            # ║ 改 secret  → GitHub UI → Settings → Secrets and variables        ║
            # ║ 改非 secret 配置 → 改 docker-compose.production.yml + push        ║
            # ║ 应急覆盖 → 写 /opt/xgzh/.env.local (自动追加到本文件末尾)          ║
            # ╚══════════════════════════════════════════════════════════════════╝
            # Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)

            # === Image Tag (deploy.yml subsequent step will overwrite) ===
            IMAGE_TAG=$EXISTING_IMAGE_TAG

            # === ACR registry (compose pull 用) ===
            ACR_REGISTRY=$ACR_REGISTRY
            ACR_NAMESPACE=$ACR_NAMESPACE
            ACR_REPOSITORY=$ACR_REPOSITORY

            # === DB / Cache 密码 ===
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD

            # === Auth ===
            JWT_SECRET=$JWT_SECRET

            # === WeChat Mini Program ===
            WECHAT_MP_APP_ID=$WECHAT_MP_APP_ID
            WECHAT_MP_APP_SECRET=$WECHAT_MP_APP_SECRET

            # === Avatar 公网 URL (BUG-S9-002) ===
            AVATAR_PUBLIC_BASE_URL=$AVATAR_PUBLIC_BASE_URL

            # === CORS (生产域名 + H5) ===
            CORS_ORIGINS=$CORS_ORIGINS

            # === LLM Providers (至少 1 个非空) ===
            ZHIPU_API_KEY=$ZHIPU_API_KEY
            SILICONFLOW_API_KEY=$SILICONFLOW_API_KEY
            DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY

            # === 数据源 ===
            TUSHARE_TOKEN=$TUSHARE_TOKEN

            # === SMS / OTP (mock=不真发; aliyun=真发, 需公司资质 + 下面 4 个 KEY) ===
            SMS_ADAPTER=$SMS_ADAPTER
            ALIYUN_SMS_ACCESS_KEY_ID=$ALIYUN_SMS_ACCESS_KEY_ID
            ALIYUN_SMS_ACCESS_KEY_SECRET=$ALIYUN_SMS_ACCESS_KEY_SECRET
            ALIYUN_SMS_SIGN_NAME=$ALIYUN_SMS_SIGN_NAME
            ALIYUN_SMS_TEMPLATE_ID=$ALIYUN_SMS_TEMPLATE_ID
            ALIYUN_SMS_INTL_TEMPLATE_ID=$ALIYUN_SMS_INTL_TEMPLATE_ID

            # === 长桥 (Sprint 7.3, 暂未启用) ===
            LONGBRIDGE_API_TOKEN=$LONGBRIDGE_API_TOKEN

            # === Admin endpoint token + 钉钉告警 + Sentry ===
            OPS_ADMIN_TOKEN=$OPS_ADMIN_TOKEN
            ALERT_DINGTALK_WEBHOOK=$ALERT_DINGTALK_WEBHOOK
            ALERT_DINGTALK_SECRET=$ALERT_DINGTALK_SECRET
            SENTRY_DSN=$SENTRY_DSN

            # === 微信支付 (DEV_MODE=true 时其余可空, 走 Stub) ===
            WECHATPAY_DEV_MODE=$WECHATPAY_DEV_MODE
            WECHATPAY_MCH_ID=$WECHATPAY_MCH_ID
            WECHATPAY_APIV3_KEY=$WECHATPAY_APIV3_KEY
            WECHATPAY_CERT_SERIAL_NO=$WECHATPAY_CERT_SERIAL_NO
            WECHATPAY_NOTIFY_URL=$WECHATPAY_NOTIFY_URL
            WECHATPAY_APP_ID=$WECHATPAY_APP_ID
            EOF

            # 应急覆盖 (Escape Hatch): 若服务器有 .env.local 就追加, 它的值会覆盖上面同名 key.
            # 用途: GH Actions 不可用时本地热修 / 临时调参 / GH Secret 没及时更新.
            if [ -f .env.local ]; then
              echo "" >> .env
              echo "# === .env.local override (NOT in git, server-local only) ===" >> .env
              cat .env.local >> .env
              echo "[INFO] Appended /opt/xgzh/.env.local to .env"
            fi

            # 600 权限: 防 host 上其它账号读 secret
            chmod 600 .env

            # 校验关键 secret 没空 (必填项缺了立即 exit 1, 阻断部署)
            for k in POSTGRES_PASSWORD JWT_SECRET; do
              v=$(grep -E "^${k}=" .env | cut -d= -f2-)
              if [ -z "$v" ]; then
                echo "❌ Required secret $k is empty — set it in GitHub Secrets and re-run."
                exit 1
              fi
            done

            echo "✅ /opt/xgzh/.env synced ($(wc -l < .env) lines, perms $(stat -c %a .env))"

      # ─── 2. SSH 到 ECS 部署 ─────────────────────────────────────
      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # 防止脚本卡住, 设 5min timeout (alembic 大表迁移可能数十秒, 不够时改 10m)
          command_timeout: 5m
          envs: ACR_REGISTRY,ACR_NAMESPACE,ACR_REPOSITORY
          script: |
            set -euo pipefail
            cd /opt/xgzh

            # ── (a) 备份当前 IMAGE_TAG (用于 rollback) ──
            CURRENT_TAG=$(grep -E '^IMAGE_TAG=' .env | cut -d= -f2 || echo "latest")
            echo "Current IMAGE_TAG (will be backup): $CURRENT_TAG"
            echo "PREVIOUS_IMAGE_TAG=$CURRENT_TAG" > .env.previous

            # ── (b) 写新 tag 到 .env ──
            NEW_TAG="${{ steps.tag.outputs.tag }}"
            echo "Deploy new tag: $NEW_TAG"
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$NEW_TAG|" .env || echo "IMAGE_TAG=$NEW_TAG" >> .env

            # ── (c) 拉新镜像 (PG/Redis 不动, 仅 BE 镜像) ──
            docker compose -f docker-compose.production.yml pull xgzh-api

            # ── (d) BUG-S9-001 自动跑 alembic upgrade head ──
            # 用 ``run --rm`` 创建一次性容器跑迁移, 跑完即销毁;
            # 不影响在跑的 xgzh-api (旧版本仍在工作), 失败 exit 非 0 立即阻断后续步骤,
            # 让旧镜像继续服务不替换. 迁移幂等 (alembic 自带 version table 去重).
            echo "==> Applying alembic migrations (idempotent, may be no-op)..."
            docker compose -f docker-compose.production.yml run --rm \
              --entrypoint /app/.venv/bin/alembic xgzh-api upgrade head

            echo "==> Current alembic head:"
            docker compose -f docker-compose.production.yml run --rm \
              --entrypoint /app/.venv/bin/alembic xgzh-api current

            # ── (e) 滚动重建 BE 容器 (用新镜像) ──
            docker compose -f docker-compose.production.yml up -d xgzh-api

            # ── (f) 显示当前容器状态 ──
            sleep 3
            docker compose -f docker-compose.production.yml ps

      # ─── 3. 健康检查 (5 retry × 5s = 25s) ──────────────────────
      - name: Health check (retry 5×)
        id: healthcheck
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 2m
          script: |
            set -e
            echo "Waiting for xgzh-api to be healthy..."
            for i in 1 2 3 4 5; do
              if curl -fsS http://localhost:8000/healthz > /dev/null 2>&1; then
                echo "✅ Health check passed (attempt $i)"
                curl -fsS http://localhost:8000/healthz
                exit 0
              fi
              echo "Attempt $i/5 failed, sleep 5s..."
              sleep 5
            done
            echo "❌ Health check failed after 5 attempts"
            echo "--- Last 50 lines of xgzh-api logs ---"
            docker logs xgzh-api --tail 50
            exit 1

      # ─── 4. 失败自动 rollback ───────────────────────────────────
      - name: Rollback on failure
        if: failure() && steps.healthcheck.conclusion == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd /opt/xgzh
            if [ ! -f .env.previous ]; then
              echo "❌ No .env.previous found, can't rollback automatically"
              exit 1
            fi
            PREVIOUS_TAG=$(cat .env.previous | grep PREVIOUS_IMAGE_TAG | cut -d= -f2)
            echo "🔄 Rolling back to $PREVIOUS_TAG"
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$PREVIOUS_TAG|" .env
            docker compose -f docker-compose.production.yml pull xgzh-api
            docker compose -f docker-compose.production.yml up -d xgzh-api
            sleep 5
            curl -fsS http://localhost:8000/healthz && echo "✅ Rolled back to $PREVIOUS_TAG"

      # ─── 5. Summary ────────────────────────────────────────────
      - name: Deploy summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            {
              echo "## ✅ Deploy succeeded"
              echo ""
              echo "- **Image tag**: \`${{ steps.tag.outputs.tag }}\`"
              echo "- **Server**: ${{ secrets.DEPLOY_HOST }}"
              echo "- **API (HTTPS)**: https://api.xgzh.top  (备份: http://${{ secrets.DEPLOY_HOST }}:8000 已废, 仅 docker 内网)"
              echo "- **H5**: https://xgzh.top"
              echo "- **Version**: https://api.xgzh.top/version"
              echo ""
              echo "本地校验: \`./xgzh/infra/verify-deploy.sh ${{ steps.tag.outputs.tag }}\`"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## ❌ Deploy failed (auto-rollback triggered if applicable)"
              echo ""
              echo "- **Failed image tag**: \`${{ steps.tag.outputs.tag }}\`"
              echo "- 检查 SSH 日志: 上面 'Health check' / 'Rollback' step"
              echo "- 手动 rollback: GitHub Actions UI → Run workflow → image_tag 填上次 sha"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

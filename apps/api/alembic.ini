[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
output_encoding = utf-8

# 实际 URL 在 env.py 内从 settings.database_url 读, 这里留空只是为了兼容
# `alembic current` 等不传 -x 也能工作的命令
sqlalchemy.url =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

name: xgzh-infra

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: xgzh-postgres
    environment:
      POSTGRES_USER: xgzh
      POSTGRES_PASSWORD: xgzh_dev_pass
      POSTGRES_DB: xgzh
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xgzh -d xgzh"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: xgzh-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: xgzh-meilisearch
    environment:
      MEILI_MASTER_KEY: xgzh_dev_meili_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - ./data/meili:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
